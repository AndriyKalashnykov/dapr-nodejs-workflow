name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read # required for dorny/paths-filter on pull_request events

env:
  # All CLI tool versions (node, pnpm, act, dapr, gitleaks, hadolint, trivy) are
  # pinned in .mise.toml / .nvmrc — jdx/mise-action installs every tool in one
  # step, and Renovate's native mise manager tracks updates. No per-tool env
  # vars here.
  # ZAP version is kept here because it's a Docker image tag (no mise backend);
  # this single value drives the cache key, pull, and save steps in the dast job.
  # renovate: datasource=github-releases depName=zaproxy/zaproxy extractVersion=^v(?<version>.*)$
  ZAP_VERSION: 2.17.0

jobs:
  changes:
    # Detects whether the push/PR touches code or only docs. Heavy jobs gate on
    # `code == 'true'` so doc-only PRs skip them. Replaces trigger-level
    # `paths-ignore` (which deadlocks against Repository Rulesets — the workflow
    # is never created → ci-pass never reports → required-check gate blocks
    # the merge indefinitely).
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      # Tag pushes always trigger the full pipeline regardless of paths-filter.
      # When a tag points at a SHA that already lives on main, the diff is
      # empty -> code=false -> every gated job skips -> ci-pass reports green
      # but the release publishes nothing. Forcing 'true' on tag refs preempts
      # this silent ghost-release failure mode.
      code: ${{ startsWith(github.ref, 'refs/tags/') && 'true' || steps.filter.outputs.code }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Filter changed paths
        id: filter
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          # `base:` is required by paths-filter on push events under act
          # (event payload doesn't carry repository.default_branch reliably).
          # On real GitHub PR events the input is ignored; gate via template
          # expression so the warning annotation only surfaces on push.
          base: ${{ github.event_name == 'push' && 'main' || '' }}
          filters: |
            code:
              - '!(**.md|docs/**|specs/**|LICENSE|.gitignore|.claudeignore|.claude/**|benchmarks/**|**.png|**.jpg|**.gif|**.svg)'
              - 'CLAUDE.md'

  static-check:
    needs: [changes]
    if: ${{ !failure() && !cancelled() && needs.changes.outputs.code == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0 # needed for gitleaks history scan
          persist-credentials: false

      - name: Set up mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          install: true
          cache: true
          experimental: true # pnpm backend

      - name: Cache pnpm store
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-store-${{ runner.os }}-

      - name: Static check
        run: make static-check

  build:
    needs: [changes, static-check]
    if: ${{ !failure() && !cancelled() && needs.changes.outputs.code == 'true' }}
    timeout-minutes: 10
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Set up mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          install: true
          cache: true
          experimental: true # pnpm backend

      - name: Cache pnpm store
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-store-${{ runner.os }}-

      - name: Build
        run: make build

      - name: Smoke test
        run: make smoke

  test:
    needs: [changes, static-check]
    if: ${{ !failure() && !cancelled() && needs.changes.outputs.code == 'true' }}
    timeout-minutes: 5
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Set up mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          install: true
          cache: true
          experimental: true # pnpm backend

      - name: Cache pnpm store
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-store-${{ runner.os }}-

      - name: Test
        run: make test

  integration-test:
    # service containers and psql aren't available under act
    if: ${{ !failure() && !cancelled() && needs.changes.outputs.code == 'true' && vars.ACT != 'true' }}
    needs: [changes, build, test]
    timeout-minutes: 10
    runs-on: ubuntu-latest

    services:
      # renovate: datasource=docker depName=postgres
      postgres:
        image: postgres:18-alpine@sha256:1b1689b20d16a014a3d195653381cf2caa75a41a92d93b255a9d6ea29fd353aa
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Set up mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          install: true
          cache: true
          experimental: true # pnpm backend

      - name: Cache pnpm store
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-store-${{ runner.os }}-

      # Dapr CLI is installed by jdx/mise-action above (pinned in .mise.toml).

      - name: Seed database
        run: make ci-seed-db

      - name: Build and start Dapr server
        run: |
          make build
          make ci-dapr-start

      - name: Test
        run: make integration-test

  e2e:
    needs: [changes, build, test]
    if: ${{ !failure() && !cancelled() && needs.changes.outputs.code == 'true' }}
    timeout-minutes: 10
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Set up mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          install: true
          cache: true
          experimental: true # pnpm backend

      - name: Cache pnpm store
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-store-${{ runner.os }}-

      - name: End-to-end test
        run: make e2e

  e2e-dapr:
    # Full-stack e2e: runs the production Docker image alongside a real Dapr
    # sidecar, schedules a workflow via HTTP and asserts it COMPLETES with the
    # expected enriched payload. Skipped under act (service containers required).
    if: ${{ !failure() && !cancelled() && needs.changes.outputs.code == 'true' && vars.ACT != 'true' }}
    needs: [changes, build, test]
    timeout-minutes: 15
    runs-on: ubuntu-latest

    services:
      # renovate: datasource=docker depName=postgres
      postgres:
        image: postgres:18-alpine@sha256:1b1689b20d16a014a3d195653381cf2caa75a41a92d93b255a9d6ea29fd353aa
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Set up mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          install: true
          cache: true
          experimental: true # pnpm backend

      - name: Initialize Dapr
        run: make dapr-init

      - name: Seed database
        run: make ci-seed-db

      - name: Build image for e2e
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          load: true
          tags: dapr-nodejs-workflow:e2e
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: End-to-end test
        run: IMAGE=dapr-nodejs-workflow:e2e RESOURCES_PATH=./dapr/ci ./e2e/e2e-dapr.sh

  e2e-durability:
    # Workflow durability e2e — Dapr's primary value proposition. Schedules a
    # workflow with a delay, kills the app container mid-flight, restarts it,
    # and asserts the workflow still COMPLETES from Redis-persisted state.
    # Skipped under act (service containers required).
    if: ${{ !failure() && !cancelled() && needs.changes.outputs.code == 'true' && vars.ACT != 'true' }}
    needs: [changes, build, test]
    timeout-minutes: 15
    runs-on: ubuntu-latest

    services:
      # renovate: datasource=docker depName=postgres
      postgres:
        image: postgres:18-alpine@sha256:1b1689b20d16a014a3d195653381cf2caa75a41a92d93b255a9d6ea29fd353aa
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Set up mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          install: true
          cache: true
          experimental: true # pnpm backend

      - name: Initialize Dapr
        run: make dapr-init

      - name: Seed database
        run: make ci-seed-db

      - name: Build image for durability e2e
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          load: true
          tags: dapr-nodejs-workflow:durability
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: End-to-end test
        run: IMAGE=dapr-nodejs-workflow:durability RESOURCES_PATH=./dapr/ci ./e2e/e2e-durability.sh

  dast:
    # DAST runs in parallel with e2e and docker — scans the production image
    # via a cache-from: type=gha build (≈10s cache hit from docker job's build),
    # starts it via make docker-smoke-test, then runs ZAP baseline. Skipped under
    # nektos/act: ZAP's docker-in-docker bind mount of $GITHUB_WORKSPACE/zap-output
    # doesn't round-trip through the host Docker daemon.
    if: ${{ !failure() && !cancelled() && needs.changes.outputs.code == 'true' && vars.ACT != 'true' }}
    needs: [changes, build, test]
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Build image for scan
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          load: true
          tags: dapr-nodejs-workflow:scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test
        run: make docker-smoke-test

      - name: Cache ZAP image
        id: cache-zap
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: /tmp/zap-image.tar
          key: zap-image-${{ env.ZAP_VERSION }}-${{ runner.os }}

      - name: Load cached ZAP image
        run: |
          set -euo pipefail
          if [ -f /tmp/zap-image.tar ]; then
            echo "Loading ZAP from cache..."
            docker load -i /tmp/zap-image.tar
          else
            echo "Pulling ghcr.io/zaproxy/zaproxy:${ZAP_VERSION}..."
            docker pull "ghcr.io/zaproxy/zaproxy:${ZAP_VERSION}"
            docker save "ghcr.io/zaproxy/zaproxy:${ZAP_VERSION}" -o /tmp/zap-image.tar
          fi

      - name: OWASP ZAP baseline scan
        run: make dast-scan

      - name: Cleanup smoke container
        if: always()
        run: docker rm -f smoke-test 2>/dev/null || true

      - name: Upload DAST report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: zap-baseline-report
          path: zap-output/
          retention-days: 30
          if-no-files-found: ignore

  docker:
    # Runs on every push, in parallel with e2e + dast. Step-level
    # `if: startsWith(github.ref, 'refs/tags/')` on Log in to GHCR /
    # Install cosign / Sign, plus `push: ${{ … }}` on the multi-arch
    # build, gates the tag-only behavior. Non-tag pushes still exercise
    # gates 1-4 (build + Trivy + smoke + multi-arch build) to catch
    # arm64 cross-compile regressions and cosign installer breakage early.
    needs: [changes, static-check, build, test]
    if: ${{ !failure() && !cancelled() && needs.changes.outputs.code == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write # GHCR push (tag-gated at step level)
      id-token: write # cosign keyless OIDC (tag-gated at step level)

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
          flavor: |
            latest=${{ startsWith(github.ref, 'refs/tags/') }}
          labels: |
            org.opencontainers.image.authors=Andriy Kalashnykov

      - name: Build image for scan
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          load: true
          tags: dapr-nodejs-workflow:scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: dapr-nodejs-workflow:scan
          scanners: "vuln,secret,misconfig"
          severity: "CRITICAL,HIGH"
          exit-code: "1"
          ignore-unfixed: true

      - name: Smoke test
        run: make docker-smoke-test

      - name: Cleanup smoke container
        if: always()
        run: docker rm -f smoke-test 2>/dev/null || true

      - name: Log in to GHCR
        if: startsWith(github.ref, 'refs/tags/')
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          # Non-tag pushes still build multi-arch to catch arm64 cross-compile
          # regressions on the commit that introduced them, but skip the registry push.
          push: ${{ startsWith(github.ref, 'refs/tags/') }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          sbom: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify multi-arch manifest
        if: startsWith(github.ref, 'refs/tags/')
        env:
          REPO: ${{ github.repository }}
          DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          REPO_LC=$(echo "$REPO" | tr '[:upper:]' '[:lower:]')
          make docker-verify-manifest IMAGE_REF="ghcr.io/${REPO_LC}@${DIGEST}"

      - name: Install cosign
        if: startsWith(github.ref, 'refs/tags/')
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign image with cosign
        if: startsWith(github.ref, 'refs/tags/')
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          set -euo pipefail
          while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            echo "→ cosign sign ${tag}@${DIGEST}"
            cosign sign --yes "${tag}@${DIGEST}"
          done <<< "${TAGS}"

  ci-pass:
    if: always()
    needs:
      [
        changes,
        static-check,
        build,
        test,
        e2e,
        e2e-dapr,
        e2e-durability,
        integration-test,
        dast,
        docker,
      ]
    timeout-minutes: 2
    runs-on: ubuntu-latest
    steps:
      - name: Verify all jobs passed
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
            echo "One or more jobs failed"
            exit 1
          fi
          if [[ "${{ contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "One or more jobs were cancelled"
            exit 1
          fi
