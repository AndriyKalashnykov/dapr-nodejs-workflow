name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths-ignore:
      - "*.md"
      - "!CLAUDE.md"
      - "docs/**"
      - "specs/**"
      - "LICENSE"
      - ".gitignore"
      - ".claudeignore"
      - ".claude/**"
      - "benchmarks/**"
      - "**.png"
      - "**.jpg"
      - "**.gif"
      - "**.svg"
  pull_request:
    paths-ignore:
      - "*.md"
      - "!CLAUDE.md"
      - "docs/**"
      - "specs/**"
      - "LICENSE"
      - ".gitignore"
      - ".claudeignore"
      - ".claude/**"
      - "benchmarks/**"
      - "**.png"
      - "**.jpg"
      - "**.gif"
      - "**.svg"
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # Node version is read from .nvmrc by mise; pnpm version is pinned in .mise.toml.
  # jdx/mise-action installs both in one step. Renovate's mise manager tracks both.
  # Dapr CLI version is duplicated from Makefile DAPR_CLI_VERSION; Renovate keeps both in sync
  # via the ci-yml-env custom regex in renovate.json.
  # renovate: datasource=github-releases depName=dapr/cli
  DAPR_CLI_VERSION: 1.17.1
  # ZAP version is duplicated from Makefile ZAP_VERSION (same reason). Kept here so
  # the cache key, image pull, and image save all reference a single value.
  # renovate: datasource=github-releases depName=zaproxy/zaproxy extractVersion=^v(?<version>.*)$
  ZAP_VERSION: 2.17.0

jobs:
  static-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0 # needed for gitleaks history scan
          persist-credentials: false

      - name: Set up mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install: true
          cache: true
          experimental: true # pnpm backend

      - name: Cache pnpm store
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-store-${{ runner.os }}-

      - name: Static check
        run: make static-check

  build:
    needs: [static-check]
    timeout-minutes: 10
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install: true
          cache: true
          experimental: true # pnpm backend

      - name: Cache pnpm store
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-store-${{ runner.os }}-

      - name: Build
        run: make build

      - name: Smoke test
        run: make smoke

  test:
    needs: [static-check]
    timeout-minutes: 5
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install: true
          cache: true
          experimental: true # pnpm backend

      - name: Cache pnpm store
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-store-${{ runner.os }}-

      - name: Test
        run: make test

  integration:
    if: ${{ vars.ACT != 'true' }} # service containers and psql aren't available under act
    needs: [build, test]
    timeout-minutes: 10
    runs-on: ubuntu-latest

    services:
      # renovate: datasource=docker depName=postgres
      postgres:
        image: postgres:18-alpine@sha256:52098013b4b64a746626437d38afc03cabff6cdeb4d3d92e2342aa95f0ce56ea
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install: true
          cache: true
          experimental: true # pnpm backend

      - name: Cache pnpm store
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-store-${{ runner.os }}-

      - name: Install Dapr CLI
        uses: dapr/setup-dapr@8d980918fd43a2765c143ce7f687665b2d46a6b9 # v2
        with:
          version: ${{ env.DAPR_CLI_VERSION }}

      - name: Seed database
        run: make ci-seed-db

      - name: Build and start Dapr + server
        run: |
          make build
          make ci-dapr-start

      - name: Test
        run: make integration-test

  e2e:
    needs: [build, test]
    timeout-minutes: 10
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install: true
          cache: true
          experimental: true # pnpm backend

      - name: Cache pnpm store
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-store-${{ runner.os }}-

      - name: Run end-to-end tests
        run: make e2e

  e2e-dapr:
    # Full-stack e2e: runs the production Docker image alongside a real Dapr
    # sidecar, schedules a workflow via HTTP and asserts it COMPLETES with the
    # expected enriched payload. Skipped under act (service containers required).
    if: ${{ vars.ACT != 'true' }}
    needs: [build, test]
    timeout-minutes: 15
    runs-on: ubuntu-latest

    services:
      # renovate: datasource=docker depName=postgres
      postgres:
        image: postgres:18-alpine@sha256:52098013b4b64a746626437d38afc03cabff6cdeb4d3d92e2342aa95f0ce56ea
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Install Dapr CLI
        uses: dapr/setup-dapr@8d980918fd43a2765c143ce7f687665b2d46a6b9 # v2
        with:
          version: ${{ env.DAPR_CLI_VERSION }}

      - name: Initialize Dapr
        run: dapr init

      - name: Seed database
        run: make ci-seed-db

      - name: Build image for e2e
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          load: true
          tags: dapr-nodejs-workflow:e2e
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run end-to-end tests with Dapr sidecar
        run: IMAGE=dapr-nodejs-workflow:e2e RESOURCES_PATH=./dapr/ci ./e2e/e2e-dapr.sh

  dast:
    # DAST runs in parallel with e2e and docker — scans the production image
    # via a cache-from: type=gha build (≈10s cache hit from docker job's build),
    # starts it via make docker-smoke-test, then runs ZAP baseline. Skipped under
    # nektos/act: ZAP's docker-in-docker bind mount of $GITHUB_WORKSPACE/zap-output
    # doesn't round-trip through the host Docker daemon.
    if: ${{ vars.ACT != 'true' }}
    needs: [build, test]
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Build image for scan
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          load: true
          tags: dapr-nodejs-workflow:scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test
        run: make docker-smoke-test

      - name: Cache ZAP image
        id: cache-zap
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: /tmp/zap-image.tar
          key: zap-image-${{ env.ZAP_VERSION }}-${{ runner.os }}

      - name: Load cached ZAP image
        run: |
          set -euo pipefail
          if [ -f /tmp/zap-image.tar ]; then
            echo "Loading ZAP from cache..."
            docker load -i /tmp/zap-image.tar
          else
            echo "Pulling ghcr.io/zaproxy/zaproxy:${ZAP_VERSION}..."
            docker pull "ghcr.io/zaproxy/zaproxy:${ZAP_VERSION}"
            docker save "ghcr.io/zaproxy/zaproxy:${ZAP_VERSION}" -o /tmp/zap-image.tar
          fi

      - name: OWASP ZAP baseline scan
        run: make dast-scan

      - name: Cleanup smoke container
        if: always()
        run: docker rm -f smoke-test 2>/dev/null || true

      - name: Upload DAST report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: zap-baseline-report
          path: zap-output/
          retention-days: 30
          if-no-files-found: ignore

  docker:
    # Runs on every push, in parallel with e2e + dast. Step-level
    # `if: startsWith(github.ref, 'refs/tags/')` on Log in to GHCR /
    # Install cosign / Sign, plus `push: ${{ … }}` on the multi-arch
    # build, gates the tag-only behavior. Non-tag pushes still exercise
    # gates 1-4 (build + Trivy + smoke + multi-arch build) to catch
    # arm64 cross-compile regressions and cosign installer breakage early.
    needs: [static-check, build, test]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write # GHCR push (tag-gated at step level)
      id-token: write # cosign keyless OIDC (tag-gated at step level)

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
          flavor: |
            latest=${{ startsWith(github.ref, 'refs/tags/') }}
          labels: |
            org.opencontainers.image.authors=Andriy Kalashnykov

      - name: Build image for scan
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          load: true
          tags: dapr-nodejs-workflow:scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: dapr-nodejs-workflow:scan
          scanners: "vuln,secret,misconfig"
          severity: "CRITICAL,HIGH"
          exit-code: "1"
          ignore-unfixed: true

      - name: Smoke test
        run: make docker-smoke-test

      - name: Cleanup smoke container
        if: always()
        run: docker rm -f smoke-test 2>/dev/null || true

      - name: Log in to GHCR
        if: startsWith(github.ref, 'refs/tags/')
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          # Non-tag pushes still build multi-arch to catch arm64 cross-compile
          # regressions on the commit that introduced them, but skip the registry push.
          push: ${{ startsWith(github.ref, 'refs/tags/') }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          sbom: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify multi-arch manifest
        if: startsWith(github.ref, 'refs/tags/')
        env:
          REPO: ${{ github.repository }}
          DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          REPO_LC=$(echo "$REPO" | tr '[:upper:]' '[:lower:]')
          make docker-verify-manifest IMAGE_REF="ghcr.io/${REPO_LC}@${DIGEST}"

      - name: Install cosign
        if: startsWith(github.ref, 'refs/tags/')
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      - name: Sign image with cosign
        if: startsWith(github.ref, 'refs/tags/')
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          set -euo pipefail
          while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            echo "→ cosign sign ${tag}@${DIGEST}"
            cosign sign --yes "${tag}@${DIGEST}"
          done <<< "${TAGS}"

  ci-pass:
    if: always()
    needs: [static-check, build, test, e2e, e2e-dapr, integration, dast, docker]
    timeout-minutes: 2
    runs-on: ubuntu-latest
    steps:
      - name: Verify all jobs passed
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
            echo "One or more jobs failed"
            exit 1
          fi
