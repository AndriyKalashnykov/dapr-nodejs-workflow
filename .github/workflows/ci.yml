name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PNPM_VERSION: 10

jobs:
  # ── Build ─────────────────────────────────────────────────────────────────────
  build:
    name: Build & audit
    timeout-minutes: 10
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Build
        run: make ci-build

      - name: Audit dependencies
        run: make audit
        continue-on-error: true

  # ── Lint ──────────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    timeout-minutes: 5
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Lint
        run: make ci-lint

  # ── Unit tests ────────────────────────────────────────────────────────────────
  test:
    name: Unit tests
    needs: lint
    timeout-minutes: 5
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Unit tests
        run: make ci-test

  # ── Smoke test ────────────────────────────────────────────────────────────────
  smoke:
    name: HTTP smoke test
    needs: [build, test]
    timeout-minutes: 5
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Smoke test
        run: make ci-smoke

  # ── Integration tests ─────────────────────────────────────────────────────
  integration:
    name: Integration tests
    needs: [build, test]
    timeout-minutes: 10
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Install Dapr CLI
        uses: dapr/setup-dapr@v2

      - name: Initialize Dapr
        run: dapr init

      - name: Seed database
        run: make ci-seed-db

      - name: Build
        run: make ci-build

      - name: Start server with Dapr sidecar
        run: |
          DAPR_HOST=localhost DAPR_HTTP_PORT=3500 \
          nohup dapr run \
            --app-id workflow-api \
            --app-port 3000 \
            --app-protocol http \
            --dapr-grpc-port 50001 \
            --dapr-http-port 3500 \
            --scheduler-host-address localhost:50006 \
            --resources-path ./dapr/ci \
            --log-level warn \
            -- node dist/api-server.js > /tmp/dapr-run.log 2>&1 &
          echo "Waiting for Dapr sidecar on :3500..."
          timeout 30 bash -c \
            'until curl -sf http://localhost:3500/v1.0/healthz > /dev/null; do sleep 1; done' \
            || { echo "=== dapr run log ==="; cat /tmp/dapr-run.log; exit 1; }
          echo "Waiting for Dapr gRPC on :50001..."
          timeout 15 bash -c \
            'until nc -z localhost 50001 2>/dev/null; do sleep 1; done' \
            || { echo "gRPC port 50001 not available"; exit 1; }
          echo "Waiting for API server on :3000..."
          timeout 15 bash -c \
            'until curl -sf http://localhost:3000/ > /dev/null; do sleep 1; done' \
            || { echo "Server failed to start"; tail -20 /tmp/dapr-run.log; exit 1; }
          echo "All services ready."

      - name: Verify Dapr sidecar is alive
        run: |
          curl -sf http://localhost:3500/v1.0/healthz && echo "Dapr HTTP OK"
          nc -z localhost 50001 && echo "Dapr gRPC OK"
          curl -sf http://localhost:3000/ && echo "API OK"

      - name: Integration tests
        run: make ci-test-integration

  # ── Gate ───────────────────────────────────────────────────────────────────
  ci-pass:
    name: CI ✓
    if: always()
    needs: [build, lint, test, smoke, integration]
    runs-on: ubuntu-latest
    steps:
      - run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
            echo "One or more jobs failed"
            exit 1
          fi
