name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_call:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read # required for dorny/paths-filter on pull_request events

env:
  # All CLI tool versions (node, pnpm, act, dapr, gitleaks, hadolint, trivy) are
  # pinned in .mise.toml / .nvmrc — jdx/mise-action installs every tool in one
  # step, and Renovate's native mise manager tracks updates. No per-tool env
  # vars here.
  # ZAP version is kept here because it's a Docker image tag (no mise backend);
  # this single value drives the cache key, pull, and save steps in the dast job.
  # ZAP is consumed only as the ghcr.io/zaproxy/zaproxy image (dast job pulls it),
  # so track the consumed sink via datasource=docker (ghcr tags are bare, no extractVersion).
  # renovate: datasource=docker depName=ghcr.io/zaproxy/zaproxy
  ZAP_VERSION: 2.17.0

jobs:
  changes:
    # Detects whether the push/PR touches code or only docs. Heavy jobs gate on
    # `code == 'true'` so doc-only PRs skip them. Replaces trigger-level
    # `paths-ignore` (which deadlocks against Repository Rulesets — the workflow
    # is never created → ci-pass never reports → required-check gate blocks
    # the merge indefinitely).
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      # Tag pushes always trigger the full pipeline regardless of paths-filter.
      # When a tag points at a SHA that already lives on main, the diff is
      # empty -> code=false -> every gated job skips -> ci-pass reports green
      # but the release publishes nothing. Forcing 'true' on tag refs preempts
      # this silent ghost-release failure mode.
      code: ${{ startsWith(github.ref, 'refs/tags/') && 'true' || steps.filter.outputs.code }}
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false
      - name: Filter changed paths
        id: filter
        uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        with:
          # `base:` is required by paths-filter on push events under act
          # (event payload doesn't carry repository.default_branch reliably).
          # On real GitHub PR events the input is ignored; gate via template
          # expression so the warning annotation only surfaces on push.
          base: ${{ github.event_name == 'push' && 'main' || '' }}
          filters: |
            code:
              - '!(**.md|docs/**|specs/**|LICENSE|.gitignore|.claudeignore|.claude/**|benchmarks/**|**.png|**.jpg|**.gif|**.svg)'
              - 'CLAUDE.md'
              # PlantUML C4 sources drive a committed-PNG drift gate (make
              # diagrams-check in static-check); re-include them so a .puml-only
              # change is classified as code and the gate actually runs.
              - 'docs/diagrams/**/*.puml'

  static-check:
    needs: [changes]
    if: ${{ !failure() && !cancelled() && needs.changes.outputs.code == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0 # needed for gitleaks history scan
          persist-credentials: false

      - name: Set up mise
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          install: true
          cache: true
          experimental: true # pnpm backend

      - name: Cache pnpm store
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-store-${{ runner.os }}-

      - name: Static check
        run: make static-check

  build:
    needs: [changes, static-check]
    if: ${{ !failure() && !cancelled() && needs.changes.outputs.code == 'true' }}
    timeout-minutes: 10
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false

      - name: Set up mise
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          install: true
          cache: true
          experimental: true # pnpm backend

      - name: Cache pnpm store
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-store-${{ runner.os }}-

      - name: Build
        run: make build

      - name: Smoke test
        run: make smoke

  test:
    needs: [changes, static-check]
    if: ${{ !failure() && !cancelled() && needs.changes.outputs.code == 'true' }}
    timeout-minutes: 5
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false

      - name: Set up mise
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          install: true
          cache: true
          experimental: true # pnpm backend

      - name: Cache pnpm store
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-store-${{ runner.os }}-

      - name: Test
        run: make test

  integration-test:
    # service containers and psql aren't available under act
    if: ${{ !failure() && !cancelled() && needs.changes.outputs.code == 'true' && vars.ACT != 'true' }}
    needs: [changes, build, test]
    timeout-minutes: 10
    runs-on: ubuntu-latest

    services:
      # renovate: datasource=docker depName=postgres
      postgres:
        image: postgres:18-alpine@sha256:9a8afca54e7861fd90fab5fdf4c42477a6b1cb7d293595148e674e0a3181de15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false

      - name: Set up mise
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          install: true
          cache: true
          experimental: true # pnpm backend

      - name: Cache pnpm store
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-store-${{ runner.os }}-

      # Dapr CLI is installed by jdx/mise-action above (pinned in .mise.toml).

      - name: Seed database
        run: make ci-seed-db

      - name: Build and start Dapr server
        run: |
          make build
          make ci-dapr-start

      - name: Test
        run: make integration-test

  e2e-compose:
    needs: [changes, build, test]
    # Compose-based (docker-in-docker) — skipped under act like the other DinD jobs.
    if: ${{ !failure() && !cancelled() && needs.changes.outputs.code == 'true' && vars.ACT != 'true' }}
    timeout-minutes: 10
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false

      - name: Compose config e2e
        run: make e2e-compose

  e2e:
    needs: [changes, build, test]
    if: ${{ !failure() && !cancelled() && needs.changes.outputs.code == 'true' }}
    timeout-minutes: 10
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false

      - name: Set up mise
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          install: true
          cache: true
          experimental: true # pnpm backend

      - name: Cache pnpm store
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-store-${{ runner.os }}-

      - name: Image structure test
        run: make image-structure-test

      - name: End-to-end test
        run: make e2e

  e2e-dapr:
    # Full-stack e2e: runs the production Docker image alongside a real Dapr
    # sidecar, schedules a workflow via HTTP and asserts it COMPLETES with the
    # expected enriched payload. Skipped under act (service containers required).
    if: ${{ !failure() && !cancelled() && needs.changes.outputs.code == 'true' && vars.ACT != 'true' }}
    needs: [changes, build, test]
    timeout-minutes: 15
    runs-on: ubuntu-latest

    services:
      # renovate: datasource=docker depName=postgres
      postgres:
        image: postgres:18-alpine@sha256:9a8afca54e7861fd90fab5fdf4c42477a6b1cb7d293595148e674e0a3181de15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Set up mise
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          install: true
          cache: true
          experimental: true # pnpm backend

      - name: Initialize Dapr
        run: make dapr-init

      - name: Seed database
        run: make ci-seed-db

      - name: Build image for e2e
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          load: true
          tags: dapr-nodejs-workflow:e2e
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: End-to-end test
        run: IMAGE=dapr-nodejs-workflow:e2e RESOURCES_PATH=./dapr/ci ./e2e/e2e-dapr.sh

  e2e-durability:
    # Workflow durability e2e — Dapr's primary value proposition. Schedules a
    # workflow with a delay, kills the app container mid-flight, restarts it,
    # and asserts the workflow still COMPLETES from Redis-persisted state.
    # Skipped under act (service containers required).
    if: ${{ !failure() && !cancelled() && needs.changes.outputs.code == 'true' && vars.ACT != 'true' }}
    needs: [changes, build, test]
    timeout-minutes: 15
    runs-on: ubuntu-latest

    services:
      # renovate: datasource=docker depName=postgres
      postgres:
        image: postgres:18-alpine@sha256:9a8afca54e7861fd90fab5fdf4c42477a6b1cb7d293595148e674e0a3181de15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Set up mise
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          install: true
          cache: true
          experimental: true # pnpm backend

      - name: Initialize Dapr
        run: make dapr-init

      - name: Seed database
        run: make ci-seed-db

      - name: Build image for durability e2e
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          load: true
          tags: dapr-nodejs-workflow:durability
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: End-to-end test
        run: IMAGE=dapr-nodejs-workflow:durability RESOURCES_PATH=./dapr/ci ./e2e/e2e-durability.sh

  dast:
    # DAST runs in parallel with e2e and docker — scans the production image
    # via a cache-from: type=gha build (≈10s cache hit from docker job's build),
    # starts it via make docker-smoke-test, then runs ZAP baseline. Skipped under
    # nektos/act: ZAP's docker-in-docker bind mount of $GITHUB_WORKSPACE/zap-output
    # doesn't round-trip through the host Docker daemon.
    # Tag-only: DAST scans the released production image, so it runs solely on
    # tag pushes (paired with the docker job below). Regular pushes/PRs skip it.
    if: ${{ !failure() && !cancelled() && needs.changes.outputs.code == 'true' && vars.ACT != 'true' && startsWith(github.ref, 'refs/tags/') }}
    needs: [changes, build, test]
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build image for scan
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          load: true
          tags: dapr-nodejs-workflow:scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test
        run: make docker-smoke-test

      - name: Cache ZAP image
        id: cache-zap
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: /tmp/zap-image.tar
          key: zap-image-${{ env.ZAP_VERSION }}-${{ runner.os }}

      - name: Load cached ZAP image
        run: |
          set -euo pipefail
          if [ -f /tmp/zap-image.tar ]; then
            echo "Loading ZAP from cache..."
            docker load -i /tmp/zap-image.tar
          else
            echo "Pulling ghcr.io/zaproxy/zaproxy:${ZAP_VERSION}..."
            docker pull "ghcr.io/zaproxy/zaproxy:${ZAP_VERSION}"
            docker save "ghcr.io/zaproxy/zaproxy:${ZAP_VERSION}" -o /tmp/zap-image.tar
          fi

      - name: OWASP ZAP baseline scan
        run: make dast-scan

      - name: Cleanup smoke container
        if: always()
        run: docker rm -f smoke-test 2>/dev/null || true

      - name: Upload DAST report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: zap-baseline-report
          path: zap-output/
          retention-days: 30
          if-no-files-found: ignore

  docker:
    # Tag-only: the whole job (amd64 image build, Trivy image CVE scan,
    # boot-marker smoke, GHCR publish, cosign signing) runs solely on tag
    # pushes. Regular pushes/PRs skip it — functional coverage comes from
    # e2e/e2e-dapr, which build+run an amd64 image every push. Images are
    # amd64-only (arm64 dropped for build speed).
    # The step-level `if: startsWith(github.ref, 'refs/tags/')` guards on Log in
    # to GHCR / push / verify-manifest / Install cosign / Sign remain as
    # defense-in-depth (redundant once the job itself is tag-gated).
    needs: [changes, static-check, build, test]
    if: ${{ !failure() && !cancelled() && needs.changes.outputs.code == 'true' && startsWith(github.ref, 'refs/tags/') }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write # GHCR push (tag-gated at step level)
      id-token: write # cosign keyless OIDC (tag-gated at step level)

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=ref,event=branch
            type=ref,event=pr
          flavor: |
            latest=${{ startsWith(github.ref, 'refs/tags/') }}
          labels: |
            org.opencontainers.image.authors=Andriy Kalashnykov

      - name: Build image for scan
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          load: true
          tags: dapr-nodejs-workflow:scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: dapr-nodejs-workflow:scan
          scanners: "vuln,secret,misconfig"
          severity: "CRITICAL,HIGH"
          exit-code: "1"
          ignore-unfixed: true

      - name: Smoke test
        run: make docker-smoke-test

      - name: Cleanup smoke container
        if: always()
        run: docker rm -f smoke-test 2>/dev/null || true

      - name: Log in to GHCR
        if: startsWith(github.ref, 'refs/tags/')
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          # amd64-only: arm64 was dropped for build speed (the QEMU-emulated
          # arm64 leg dominated the docker job's wall-clock). This job is
          # tag-gated, so the build+push runs only on tag pushes.
          push: ${{ startsWith(github.ref, 'refs/tags/') }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          sbom: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify image manifest
        if: startsWith(github.ref, 'refs/tags/')
        env:
          REPO: ${{ github.repository }}
          DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          REPO_LC=$(echo "$REPO" | tr '[:upper:]' '[:lower:]')
          make docker-verify-manifest IMAGE_REF="ghcr.io/${REPO_LC}@${DIGEST}"

      - name: Install cosign
        if: startsWith(github.ref, 'refs/tags/')
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign image with cosign
        if: startsWith(github.ref, 'refs/tags/')
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          set -euo pipefail
          while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            echo "→ cosign sign ${tag}@${DIGEST}"
            cosign sign --yes "${tag}@${DIGEST}"
          done <<< "${TAGS}"

  ci-pass:
    if: always()
    needs:
      [
        changes,
        static-check,
        build,
        test,
        e2e-compose,
        e2e,
        e2e-dapr,
        e2e-durability,
        integration-test,
        dast,
        docker,
      ]
    timeout-minutes: 2
    runs-on: ubuntu-latest
    steps:
      - name: Verify all jobs passed
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
            echo "One or more jobs failed"
            exit 1
          fi
          if [[ "${{ contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "One or more jobs were cancelled"
            exit 1
          fi
