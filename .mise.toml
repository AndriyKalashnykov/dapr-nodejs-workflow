[tools]
# Node is pinned via .nvmrc (single source of truth; mise reads it natively).
# pnpm is pinned here because `package.json#packageManager` is consumed by
# corepack, not by mise — this entry lets `mise install` bootstrap pnpm
# alongside Node in one step, and keeps CI and local dev on the same version.
pnpm = "10.33.0"
