[tools]
# Node: pin major.minor.patch here (NOT just .nvmrc) so mise's shim
# unambiguously wins over the GitHub runner's pre-installed Node when pnpm
# probes the engine version on `pnpm install`/`pnpm run`. With .nvmrc alone
# (just "24"), pnpm 11+ finds /usr/local/bin/node first during its bootstrap
# probe and emits `[WARN] Unsupported engine: wanted >=24.14.1, current
# v20.20.2` on every step. Keep this >= engines.node in package.json.
# Renovate's native mise manager tracks the pin automatically.
node = "24.18.0"
# pnpm is pinned here because `package.json#packageManager` is consumed by
# corepack, not by mise — this entry lets `mise install` bootstrap pnpm
# alongside Node in one step, and keeps CI and local dev on the same version.
pnpm = "11.12.0"

# CLI tools — installed via mise so local dev and CI (via jdx/mise-action) use
# the same pinned versions from one source of truth. Renovate's native mise
# manager tracks these automatically (no custom regex required).
act = "0.2.89"
dapr = "1.18.0"
gitleaks = "8.30.1"
hadolint = "2.14.0"
trivy = "0.72.0"
# container-structure-test: asserts the built image's structure (make image-structure-test).
# aqua backend → github-tags datasource; the mise "mise tools" group's 3-day buffer applies.
"aqua:GoogleContainerTools/container-structure-test" = "1.22.1"

# Renovate's CLI is NOT pinned here on purpose. It is a heavyweight npm tool
# (600+ packages) needed only by the rarely-run `make renovate` /
# `renovate-validate` dev targets, yet every `mise install` (which `make deps`
# — a prerequisite of install/build/lint/test — runs) would reinstall it. Worse,
# Renovate self-bumps this pin ~daily, so the pin constantly drifts and `make
# deps` re-fetches the whole tree on nearly every invocation (the "make deps
# hangs" report). It is now installed lazily by those two targets via
# `mise exec npm:renovate@$(RENOVATE_VERSION)` and version-tracked by the
# Makefile customManager (datasource=npm depName=renovate) instead.
