name: dapr-workflow

services:
  redis:
    image: docker.io/redis:8-alpine@sha256:9d317178eceac8454a2284a9e6df2466b93c745529947f0cd42a0fa9609d7005
    ports:
      # Host port is operator-tunable (mirrors REDIS_PORT in the Makefile/.env);
      # the container-internal port stays 6379. Lets the stack run alongside
      # another Redis already holding 6379 on the host.
      - "${REDIS_PORT:-6379}:6379"
    restart: unless-stopped
    command:
      [
        "redis-server",
        "--appendonly",
        "no",
        "--maxmemory",
        "500mb",
        "--maxmemory-policy",
        "allkeys-lru",
      ]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: ${COMPOSE_HEALTHCHECK_INTERVAL:-10s}
      timeout: ${COMPOSE_HEALTHCHECK_TIMEOUT:-5s}
      retries: ${COMPOSE_HEALTHCHECK_RETRIES:-5}

  postgres:
    image: docker.io/postgres:18-alpine@sha256:1b1689b20d16a014a3d195653381cf2caa75a41a92d93b255a9d6ea29fd353aa
    ports:
      # Host port is operator-tunable (mirrors POSTGRES_PORT in the Makefile/.env);
      # the container-internal port stays 5432. Lets the stack run alongside
      # another Postgres already holding 5432 on the host.
      - "${POSTGRES_PORT:-5432}:5432"
    restart: unless-stopped
    shm_size: 128mb
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: daprrulz
    volumes:
      - ./db/baseline_ddl.sql:/docker-entrypoint-initdb.d/01_create_tables.sql
      - ./db/baseline_dml.sql:/docker-entrypoint-initdb.d/02_fill_tables.sql
      # postgres:18 stores data in a major-version subdir under /var/lib/postgresql
      # (moved from /var/lib/postgresql/data in 17-). Mount the volume at the new
      # parent path so the image manages the versioned subdir itself; mounting at
      # the old /var/lib/postgresql/data makes 18 refuse to start ("unused mount").
      - pg-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: ${COMPOSE_HEALTHCHECK_INTERVAL:-10s}
      timeout: ${COMPOSE_HEALTHCHECK_TIMEOUT:-5s}
      retries: ${COMPOSE_HEALTHCHECK_RETRIES:-5}

volumes:
  pg-data:
